<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feedback</title>

<style>
@font-face {
  font-family: 'pixelify';
  src: url('pixelify.ttf') format('truetype');
  font-display: swap;
}

body {
  margin: 0;
  font-family: 'pixelify', sans-serif;
  color: #e2e8f0;

  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;

  background:
    linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.8)),
    url("https://cdn1.epicgames.com/ue/product/Screenshot/Screenshot19-1920x1080-810b476ed14a4555fd683c9bce63979e.jpg");

  background-size: cover;
  background-position: center;
}

/* Card */
.card {
  width: 90%;
  max-width: 800px;
  padding: 25px;

  background: rgba(30, 41, 59, 0.9);
  border-radius: 12px;

  box-shadow: 0 6px 25px rgba(0,0,0,0.7);
}

/* Title */
.title {
  text-align: center;
  font-size: 1.8rem;
  margin-bottom: 20px;
}

/* Widget wrapper */
.widget-wrap {
  border-radius: 10px;
  overflow: hidden;
}
</style>
</head>

<body>

<div class="card">
  <div class="title">Give your valuable feedback here!</div>

  <div class="widget-wrap">
    <!-- Elfsight Comments -->
    <script src="https://elfsightcdn.com/platform.js" async></script>
    <div class="elfsight-app-ef8dcf23-e4e3-4ed3-b989-63ade33f0516" data-elfsight-app-lazy></div>
  </div>
</div>

</body>
</html>
