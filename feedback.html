<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Give Comments</title>

  <style>
    @font-face {
      font-family: 'Pixelify';
      src: url('pixelify.ttf') format('truetype');
      font-display: swap;
    }

    body {
      margin: 0;
      font-family: 'Pixelify', sans-serif;
      color: #e2e8f0;

      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;

      min-height: 100vh;

      background:
        linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)),
        url("https://cdn1.epicgames.com/ue/product/Screenshot/Screenshot19-1920x1080-810b476ed14a4555fd683c9bce63979e.jpg");

      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }

    h1 {
      margin-bottom: 20px;
      text-align: center;
    }

    .comments-box {
      width: 90%;
      max-width: 800px;
      background: rgba(30, 41, 59, 0.9);
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
    }
  </style>
</head>

<body>

  <h1>Give your valuable feedback here!</h1>

  <div class="comments-box">
    <!-- Elfsight Comments -->
    <script src="https://elfsightcdn.com/platform.js" async></script>
    <div class="elfsight-app-ef8dcf23-e4e3-4ed3-b989-63ade33f0516" data-elfsight-app-lazy></div>
  </div>

</body>
</html>
