<!DOCTYPE html>

<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 – Lost in the Forest</title>

  <style>
    @font-face {
      font-family: pixelify;
      src: url(pixelify.ttf);
    }

    body {
      margin: 0;
      font-family: pixelify, sans-serif;
      color: #e2e8f0;

      background:
        linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)),
        url("https://external-content.duckduckgo.com/iu/?u=https%3A%2F%2Fcdn1.epicgames.com%2Fue%2Fproduct%2FScreenshot%2FScreenshot19-1920x1080-810b476ed14a4555fd683c9bce63979e.jpg");

      background-size: cover;
      background-position: center;
      background-attachment: fixed;

      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .container {
      background: rgba(30, 41, 59, 0.9);
      padding: 40px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      max-width: 500px;
    }

    h1 {
      margin: 0;
      font-size: 2.5rem;
    }

    p {
      margin-top: 15px;
      font-size: 1rem;
      opacity: 0.85;
    }

    .home-btn {
      display: inline-block;
      margin-top: 25px;
      padding: 12px 20px;
      background: #38bdf8;
      color: black;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      transition: 0.2s;
    }

    .home-btn:hover {
      background: #0ea5e9;
      transform: scale(1.05);
    }
  </style>

</head>

<body>

  <div class="container">
    <h1>404</h1>
    <p>You wandered too far into the forest…</p>
    <p>The page you’re looking for doesn’t exist.</p>

```
<a href="/" class="home-btn">⬅ Return Home</a>
```

  </div>

</body>
</html>
